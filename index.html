<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Detective</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #F4F2EF;
            padding: 20px;
            margin: 0;
        }
        .item {
            background: #FFF;
            border-radius: 10px;
            padding: 12px;
            margin: 8px 0;
            font-size: 11px;
            word-break: break-all;
            border: 1px solid #E8E4DD;
        }
        .key {
            font-weight: 600;
            color: #37442F;
        }
        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            background: #37442F;
            color: #FFF;
            width: 100%;
            margin: 10px 0;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <h2>Storage Detective</h2>
    <p>This page shows ALL data stored by this website.</p>
    <button onclick="showAll()">Scan Storage</button>
    <button onclick="copyAll()">Copy All Data</button>
    <div id="output"></div>
    <script>
        function showAll() {
            let html = '';
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                let preview = value;
                try {
                    const parsed = JSON.parse(value);
                    if (parsed && parsed.tasks) {
                        preview = '✅ FOUND: ' + parsed.tasks.length + ' tasks, ' + parsed.wins + ' wins, ' + parsed.impulses + ' impulses';
                    }
                } catch (e) {}
                html += '<div class="item"><span class="key">' + key + '</span><br>' + preview + '</div>';
            }
            if (html === '') html = '<p>No data found.</p>';
            document.getElementById('output').innerHTML = html;
        }
        function copyAll() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                data[localStorage.key(i)] = localStorage.getItem(localStorage.key(i));
            }
            const text = JSON.stringify(data, null, 2);
            navigator.clipboard.writeText(text).then(() => alert('Copied! Send this to me.'));
        }
    </script>
</body>
</html>
