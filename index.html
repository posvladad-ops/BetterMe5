<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Better Me">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><rect width='180' height='180' rx='40' fill='%23F5F3EF' stroke='%231B1B1B' stroke-width='3'/><circle cx='58' cy='90' r='14' fill='none' stroke='%23C5C0B8' stroke-width='4'/><circle cx='122' cy='90' r='14' fill='none' stroke='%23C5C0B8' stroke-width='4'/><circle cx='90' cy='90' r='14' fill='%2337442F' stroke='%2337442F' stroke-width='4'/><line x1='72' y1='90' x2='76' y2='90' stroke='%23C5C0B8' stroke-width='4'/><line x1='104' y1='90' x2='108' y2='90' stroke='%23C5C0B8' stroke-width='4'/></svg>">
    <title>Better Me</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        :root {
            --bg: #F4F2EF;
            --card: #FFFFFF;
            --text: #1B1B1B;
            --text-light: #999;
            --text-muted: #C5C5C5;
            --border: #E8E4DD;
            --khaki: #37442F;
            --win: #5B8C7A;
            --lose: #B06A6A;
            --radius: 12px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 60px 16px 120px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            font-size: 15px;
            overflow-x: hidden;
            letter-spacing: -0.2px;
            font-stretch: expanded;
        }
        input, textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        .app {
            max-width: 420px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 0 4px;
        }
        .header .titles {
            flex: 1;
        }
        .header h1 {
            font-size: 21px;
            font-weight: 500;
            letter-spacing: -0.3px;
        }
        .header .sub {
            font-size: 10px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-top: 2px;
        }
        .menu-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            flex-shrink: 0;
            margin-left: 12px;
        }

        .panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 200;
            pointer-events: none;
            transition: background 0.3s;
        }
        .panel-overlay.show {
            background: rgba(27,25,22,0.5);
            pointer-events: all;
        }
        .slide-panel {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: #FFFEFB;
            z-index: 210;
            box-shadow: -4px 0 30px rgba(0,0,0,0.1);
            transition: right 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            padding: 60px 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .slide-panel.show {
            right: 0;
        }
        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .section-title {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
        }
        .panel-btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 12px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: var(--text);
        }
        .panel-btn.danger {
            color: #B06A6A;
            border-color: #E8D5D5;
        }
        .panel-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-family: inherit;
        }
        .week-rings {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .week-ring {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 8px;
            color: var(--text-muted);
        }
        .week-ring svg {
            width: 34px;
            height: 34px;
            transform: rotate(-90deg);
        }
        .wr-bg {
            fill: none;
            stroke: #EDECE9;
            stroke-width: 3;
        }
        .wr-fill {
            fill: none;
            stroke: var(--khaki);
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        .wr-fill.done {
            stroke: var(--win);
        }
        .goals-summary {
            font-size: 11px;
            color: var(--text-light);
            cursor: pointer;
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .goals-expanded {
            display: block;
        }
        .goals-expanded.hidden {
            display: none;
        }
        .goal-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            font-size: 11px;
        }
        .goal-check {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid #C5C0B8;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: transparent;
        }
        .goal-check.done {
            background: var(--khaki);
            border-color: var(--khaki);
            color: #FFF;
        }
        .goal-name {
            flex: 1;
        }
        .goal-del {
            font-size: 10px;
            color: #CCC;
            cursor: pointer;
        }
        .manifest-box {
            background: #FBFAF5;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 10px;
            color: var(--text-light);
            font-style: italic;
            text-align: center;
            letter-spacing: 0.2px;
        }

        .cal-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(27,25,22,0.7);
            z-index: 250;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
        }
        .cal-modal.show {
            opacity: 1;
            pointer-events: all;
        }
        .cal-modal-card {
            background: #FFFEFB;
            border-radius: 20px;
            padding: 20px 16px;
            margin: 16px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .cal-month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 15px;
        }
        .cal-month-header button {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px 3px;
            text-align: center;
        }
        .cal-cell-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 3px 0;
            border-radius: 8px;
        }
        .cal-cell-wrap:active {
            background: #F8F6F2;
        }
        .cal-num {
            font-size: 11px;
            font-weight: 500;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .cal-cell-wrap.today .cal-num {
            background: var(--khaki);
            color: #FFF;
        }
        .cal-mini-ring {
            width: 20px;
            height: 20px;
            transform: rotate(-90deg);
        }
        .cmr-bg {
            fill: none;
            stroke: #EDECE9;
            stroke-width: 2.5;
        }
        .cmr-fill {
            fill: none;
            stroke: var(--khaki);
            stroke-width: 2.5;
            stroke-linecap: round;
        }
        .cmr-fill.done {
            stroke: var(--win);
        }
        .cal-close {
            display: block;
            margin: 16px auto 0;
            padding: 8px 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
        }
        .score-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .score-box {
            flex: 1;
            text-align: center;
            padding: 10px 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #FAFAF8;
        }
        .score-box .label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
        }
        .score-box .val {
            font-size: 32px;
            font-weight: 400;
            color: var(--text);
        }
        .streak-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }
        .streak-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #E5E0D8;
        }
        .streak-dot.on {
            background: var(--khaki);
        }
        .streak-num {
            font-size: 11px;
            font-weight: 500;
            margin-left: 6px;
            color: var(--text-light);
        }
        .bar-wrap {
            margin-bottom: 10px;
        }
        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        .bar {
            height: 3px;
            background: #E8E5DE;
            border-radius: 2px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--khaki);
            border-radius: 2px;
            transition: width 0.4s;
        }
        .input-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .input-row input {
            flex: 1;
            padding: 9px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 12px;
            background: #FAFAF8;
            outline: none;
            font-family: inherit;
        }
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .btn {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
        }
        .btn-win {
            background: #F6F9F7;
            border-color: #C5DCD0;
            color: #3D6B57;
        }
        .btn-lose {
            background: #FBF7F7;
            border-color: #E5CCCC;
            color: #8B5555;
        }

        .game-log-toggle {
            font-size: 10px;
            color: var(--text-light);
            cursor: pointer;
            text-align: center;
            padding: 4px 0;
            letter-spacing: 0.3px;
        }
        .game-log-list {
            display: none;
            max-height: 150px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .game-log-list.show {
            display: block;
        }
        .game-log-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 10px;
            border-bottom: 1px solid #F5F3EF;
            gap: 6px;
        }
        .game-log-item .gl-reason {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }
        .game-log-item .gl-type {
            font-weight: 500;
            font-size: 9px;
        }
        .game-log-item .gl-type.win {
            color: var(--win);
        }
        .game-log-item .gl-type.lose {
            color: var(--lose);
        }

        .mini-cal {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 4px 0;
        }
        .mini-day {
            min-width: 34px;
            height: 40px;
            border-radius: 6px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            color: var(--text-muted);
            flex-shrink: 0;
            cursor: pointer;
        }
        .mini-day.today {
            border-color: var(--text);
            border-width: 1.5px;
        }
        .mini-day.selected {
            border-color: var(--khaki);
            background: #F6F5F0;
        }
        .mini-day.done::after {
            content: '●';
            font-size: 5px;
            color: var(--khaki);
        }
        .mini-day.missed::after {
            content: '○';
            font-size: 5px;
            color: var(--lose);
        }
        .mini-day .dow {
            font-size: 7px;
        }
        .mini-day .num {
            font-size: 11px;
            font-weight: 500;
            color: var(--text);
        }

        .chain-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .chain-top {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chain-nav {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chain-nav button {
            width: 24px;
            height: 24px;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: var(--card);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chain-date {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            min-width: 60px;
            text-align: center;
        }
        .chain-today-badge {
            font-size: 8px;
            color: var(--win);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chain-status {
            font-size: 9px;
            font-weight: 500;
        }
        .chain-status.no {
            color: #B06A6A;
        }
        .chain-status.yes {
            color: var(--win);
        }
        .chain-ring-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chain-ring-container {
            position: relative;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }
        .chain-ring-svg {
            width: 44px;
            height: 44px;
            transform: rotate(-90deg);
        }
        .cr-bg {
            fill: none;
            stroke: #EDECE9;
            stroke-width: 4;
        }
        .cr-fill {
            fill: none;
            stroke: var(--khaki);
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s ease;
        }
        .cr-fill.complete {
            stroke: var(--win);
        }
        .cr-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 500;
            color: var(--text);
        }
        .task {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-bottom: 1px solid #F5F3EF;
        }
        .task:last-child {
            border-bottom: none;
        }
        .task-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #E0DCD5;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: transparent;
            cursor: pointer;
        }
        .task-dot.done {
            background: var(--khaki);
            border-color: var(--khaki);
            color: #FFF;
        }
        .task-info {
            flex: 1;
            min-width: 0;
        }
        .task-name-input {
            font-size: 12px;
            border: none;
            background: transparent;
            outline: none;
            font-family: inherit;
            width: 100%;
            color: var(--text);
            padding: 2px 0;
        }
        .task.done .task-name-input {
            text-decoration: line-through;
            color: #C5C5C5;
        }
        .task-time-row {
            display: flex;
            gap: 4px;
            align-items: center;
            margin-top: 2px;
        }
        .task-time-input {
            font-size: 9px;
            color: var(--text-light);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 2px 4px;
            width: 48px;
            text-align: center;
            background: #FAFAF8;
            outline: none;
            font-family: inherit;
        }
        .task-grip {
            font-size: 11px;
            color: #C5C0B8;
            cursor: pointer;
            padding: 4px 2px;
        }
        .task-del {
            font-size: 12px;
            color: #CCC;
            cursor: pointer;
            padding: 2px;
        }
        .add-row {
            display: flex;
            gap: 5px;
            padding: 8px 12px;
            border-top: 1px solid var(--border);
        }
        .add-row input {
            padding: 7px 8px;
            border-radius: 5px;
            border: 1px solid var(--border);
            font-size: 11px;
            background: #FAFAF8;
            outline: none;
            font-family: inherit;
        }
        .add-row input.name {
            flex: 2;
        }
        .add-row input.time {
            flex: 1;
            text-align: center;
            min-width: 45px;
        }
        .add-row button {
            padding: 7px 10px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            color: var(--text);
        }
        .actions {
            display: flex;
            gap: 5px;
            padding: 8px 12px 10px;
            flex-wrap: wrap;
        }
        .actions button {
            font-size: 9px;
            color: var(--text-light);
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 7px;
            cursor: pointer;
            font-family: inherit;
        }

        .stopwatch-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px;
            border: 1px solid var(--border);
        }
        .stopwatch-card h3 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 10px;
        }
        .sw-display {
            font-size: 42px;
            font-weight: 300;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-family: 'SF Mono', 'Menlo', monospace;
            padding: 10px 0;
            background: #FAFAF8;
            border-radius: 8px;
        }
        .sw-task-input {
            width: 100%;
            padding: 9px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 13px;
            background: #FAFAF8;
            outline: none;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .sw-btns {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .sw-btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            background: var(--card);
            color: var(--text);
            font-weight: 500;
        }
        .sw-btn.start {
            background: #F6F9F7;
            border-color: #C5DCD0;
            color: #3D6B57;
        }
        .sw-btn.stop {
            background: #FBF7F7;
            border-color: #E5CCCC;
            color: #8B5555;
        }
        .sw-history {
            max-height: 180px;
            overflow-y: auto;
        }
        .sw-history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #F5F3EF;
            font-size: 11px;
            gap: 8px;
        }
        .sw-h-task {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sw-h-time {
            font-family: 'SF Mono', 'Menlo', monospace;
            color: var(--text-light);
            font-size: 11px;
        }
        .sw-h-del {
            color: #CCC;
            cursor: pointer;
            font-size: 12px;
        }

        .stats {
            display: flex;
            gap: 6px;
        }

    <script>
        const STORAGE = 'bm_final_v4';
        function load() {
            const allKeys = [];
            for (let i = 0; i < localStorage.length; i++) allKeys.push(localStorage.key(i));
            let r = localStorage.getItem(STORAGE);
            if (r) { try { const d = JSON.parse(r); if (d && d.tasks && d.done) return d; } catch (e) {} }
            let best = null, bestScore = 0;
            for (const key of allKeys) {
                r = localStorage.getItem(key);
                if (!r) continue;
                try {
                    const data = JSON.parse(r);
                    if (data && data.tasks && Array.isArray(data.tasks) && data.done) {
                        let score = data.tasks.length;
                        if (data.future) score += Object.keys(data.future).length * 5;
                        if (data.wins) score += data.wins * 2;
                        if (data.goals) score += data.goals.length * 3;
                        if (score > bestScore) { bestScore = score;
                            best = data; }
                    }
                } catch (e) {}
            }
            if (best) { localStorage.setItem(STORAGE, JSON.stringify(best)); return best; }
            return { wins: 0, impulses: 0, tasks: [{ id: 1, name: 'Make the bed', start: '07:00', end: '07:05' }], done: {}, today: {}, nextId: 2, future: {}, swHistory: {}, goals: [{ id: 1, name: 'Read 12 books', done: false }], nextGoalId: 2, gameLog: {} };
        }
        function save() { localStorage.setItem(STORAGE, JSON.stringify(D)); }
        let D = load();
        const tk = () => new Date().toISOString().slice(0, 10);
        const dk = (d) => d.toISOString().slice(0, 10);
        const $ = (id) => document.getElementById(id);
        let viewOffset = 0;
        function viewKey() { const d = new Date();
            d.setDate(d.getDate() + viewOffset); return dk(d); }
        const RING = 2 * Math.PI * 18;

        let swInterval = null, swSeconds = 0;
        function loadSw() {
            const today = tk();
            if (!D.swHistory) D.swHistory = {};
            if (!D.swHistory[today]) D.swHistory[today] = [];
            swSeconds = 0;
            swUpdate();
            renderSwHistory();
        }
        function swFmt(s) { const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60; return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0'); }
        function swUpdate() { $('swDisplay').textContent = swFmt(swSeconds); }
        function renderSwHistory() {
            const today = tk();
            const history = D.swHistory[today] || [];
            if (history.length === 0) { $('swHistory').innerHTML = '<div style="font-size:10px;color:#C5C5C5;text-align:center;padding:10px 0;">No records today</div>'; return; }
            $('swHistory').innerHTML = history.slice().reverse().map((h, i) => '<div class="sw-history-item"><span class="sw-h-task">' + esc(h.task) + '</span><span class="sw-h-time">' + swFmt(h.seconds) + '</span><span class="sw-h-del" data-idx="' + (history.length - 1 - i) + '">×</span></div>').join('');
            $('swHistory').querySelectorAll('.sw-h-del').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation();
                D.swHistory[today].splice(parseInt(el.dataset.idx), 1);
                save();
                renderSwHistory(); }); });
        }
        $('swStartBtn').addEventListener('click', () => { if (swInterval) return;
            swInterval = setInterval(() => { swSeconds++;
                swUpdate(); }, 1000);
            $('swStartBtn').textContent = 'Running...'; });
        $('swStopBtn').addEventListener('click', () => { if (!swInterval && swSeconds === 0) return;
            clearInterval(swInterval);
            swInterval = null; const task = $('swTaskName').value.trim() || 'Untitled'; const today = tk(); if (!D.swHistory[today]) D.swHistory[today] = [];
            D.swHistory[today].push({ task, seconds: swSeconds });

            renderSwHistory();

        $('swResetBtn').addEventListener('click', () => { clearInterval(swInterval);
            swInterval = null;
            swSeconds = 0;
            swUpdate();
            $('swStartBtn').textContent = 'Start'; });

        const manifestations = [

        function renderManifest() {
            const idx = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000) % manifestations.length;
            $('manifestBox').textContent = '✦ ' + manifestations[idx];
        }

        const letters = [
            "Dear you,\n\nI'm writing from one year ahead. I know today feels heavy — 21 tasks, endless English, the same routine. But I need you to know: every single minute you invested is paying off. I speak fluently now. I landed the opportunity we dreamed about. I wake up without anxiety because you built the systems. You did that. The chain you're completing today? It forged me. Don't you dare stop.\n\nWith eternal gratitude,\nYour Future Self",

        ];
        function showLetter() {
            const idx = Math.floor(Math.random() * letters.length);
            $('motiveQuote').textContent = letters[idx];
            $('motiveSub').textContent = '';
            $('motiveModal').classList.add('show');

        $('motiveCloseBtn').addEventListener('click', () => $('motiveModal').classList.remove('show'));
        $('motiveModal').addEventListener('click', (e) => { if (e.target === $('motiveModal')) $('motiveModal').classList.remove('show'); });

        function getWeekDays() {
            const days = [];
            const today = new Date();
            const dow = today.getDay(), monOff = dow === 0 ? -6 : 1 - dow;
            const mon = new Date(today);
            mon.setDate(today.getDate() + monOff);
            for (let i = 0; i < 7; i++) { const d = new Date(mon);
                d.setDate(mon.getDate() + i); const key = dk(d); const tasks = getTasksForDay(key); const total = tasks.length; const doneCount = key === tk() ? (D.today ? tasks.filter(t => D.today[t.id] === true).length : 0) : (D.done[key] === true ? total : 0); const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
                days.push({ key, label: ['M','T','W','T','F','S','S'][i], date: d.getDate(), isToday: key === tk(), pct, total, done: D.done[key] === true }); }
            return days;
        }
        function renderWeekRings() {
            const days = getWeekDays();
            const wrc = 2 * Math.PI * 13;
            $('weekRings').innerHTML = days.map(d => '<div class="week-ring"><svg viewBox="0 0 34 34"><circle class="wr-bg" cx="17" cy="17" r="13"/><circle class="wr-fill' + (d.done && d.total > 0 ? ' done' : '') + '" cx="17" cy="17" r="13" stroke-dasharray="' + wrc.toFixed(1) + '" stroke-dashoffset="' + (wrc - (d.pct / 100) * wrc) + '"/></svg><span>' + d.label + ' ' + d.date + '</span></div>').join('');
        }
        function renderChainRing() {
            const vk = viewKey();
            const tasks = getTasksForDay(vk);
            const comp = vk === tk() ? D.today : {};
            const doneCount = tasks.filter(t => comp[t.id] === true).length;
            const total = tasks.length;
            const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
            $('chainRingFill').style.strokeDashoffset = RING - (pct / 100) * RING;
            $('chainRingFill').classList.toggle('complete', pct === 100 && total > 0);
            $('chainRingText').textContent = total > 0 ? pct + '%' : '—';
        }
        function renderGoals() {
            const doneCount = D.goals.filter(g => g.done).length;
            const total = D.goals.length;
            $('goalsSummary').innerHTML = '<span>' + doneCount + '/' + total + ' completed</span><span>' + (total > 0 ? Math.round((doneCount / total) * 100) : 0) + '%</span>';
            $('goalsExpanded').innerHTML = D.goals.map(g => '<div class="goal-item"><div class="goal-check' + (g.done ? ' done' : '') + '" data-id="' + g.id + '">' + (g.done ? '✓' : '') + '</div><span class="goal-name">' + esc(g.name) + '</span><span class="goal-del" data-id="' + g.id + '">×</span></div>').join('');
            $('goalsExpanded').querySelectorAll('.goal-check').forEach(el => { el.addEventListener('click', () => { const g = D.goals.find(g => g.id === parseInt(el.dataset.id)); if (g) g.done = !g.done;
                save();
                renderGoals(); }); });
            $('goalsExpanded').querySelectorAll('.goal-del').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation();
                D.goals = D.goals.filter(g => g.id !== parseInt(el.dataset.id));
                save();
                renderGoals(); }); });
            $('goalsSummary').onclick = () => { $('goalsExpanded').classList.toggle('hidden'); };
        }
        function exportData() {
            const blob = new Blob([JSON.stringify(D, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'better-me-backup-' + tk() + '.json';
            a.click();
            URL.revokeObjectURL(url);
            toast('Exported!');
        }
        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => { try { const imported = JSON.parse(e.target.result); if (imported && imported.tasks && imported.done) { D = imported;
                    save();
                    renderAll();
                    toast('Imported!'); } else { toast('Invalid file'); } } catch (err) { toast('Error reading file'); } };
            reader.readAsText(file);
        }

        function getTasksForDay(key) {
            if (key === tk()) return D.tasks;
            if (D.future[key]) return D.future[key];
            return [];
        }

        function renderGameLog() {
            const today = tk();

            if (log.length === 0) {
                $('gameLogToggle').textContent = 'No moments today';
                $('gameLogList').innerHTML = '';
                return;
            }
            $('gameLogToggle').textContent = 'Today\'s moments (' + log.length + ') ▾';
            $('gameLogList').innerHTML = log.slice().reverse().map(l => {
                const typeLabel = l.type === 'win' ? 'Win' : 'Impulse';
                const typeClass = l.type === 'win' ? 'win' : 'lose';

            }).join('');
            if (!$('gameLogList').classList.contains('show')) $('gameLogToggle').textContent = 'Today\'s moments (' + log.length + ') ▾';
        }
        $('gameLogToggle').addEventListener('click', () => {
            $('gameLogList').classList.toggle('show');
            $('gameLogToggle').textContent = $('gameLogList').classList.contains('show') ?
                'Today\'s moments ▴' : 'Today\'s moments ▾';
        });

        function renderAll() {
            $('winScore').textContent = D.wins || 0;
            $('impulseScore').textContent = D.impulses || 0;

            $('ratioText').textContent = t > 0 ? D.wins + ':' + D.impulses + ' (' + Math.round((D.wins / t) * 100) + '%)' : '0:0';
            let s = 0;
            const today = tk();
            if (D.done[today] === true) { s = 1;
                const d = new Date(); while (true) { d.setDate(d.getDate() - 1); if (D.done[dk(d)] === true) s++;
                    else break; } } else { const y = new Date();
                y.setDate(y.getDate() - 1); if (D.done[dk(y)] === true) { s = 1;
                    const d = new Date(y); while (true) { d.setDate(d.getDate() - 1); if (D.done[dk(d)] === true) s++;
                        else break; } } }
            $('streakDots').innerHTML = Array.from({ length: 7 }, (_, i) => '<div class="streak-dot' + (i < s ? ' on' : '') + '"></div>').join('') + '<span class="streak-num">' + s + ' days</span>';
            const cal = [];
            const now = new Date();
            for (let i = -3; i <= 10; i++) { const d = new Date(now);
                d.setDate(now.getDate() + i); const key = dk(d);
                cal.push({ key, num: d.getDate(), dow: ['S','M','T','W','T','F','S'][d.getDay()], isToday: i === 0, isSel: i === viewOffset, status: D.done[key] }); }
            $('miniCal').innerHTML = '';
            cal.forEach(c => {
                const el = document.createElement('div');
                let cls = 'mini-day';

                if (c.status === true) cls += ' done';

                el.className = cls;
                el.innerHTML = '<span class="dow">' + c.dow + '</span><span class="num">' + c.num + '</span>';
                el.addEventListener('click', () => {
                    const todayD = new Date();
                    const d = new Date(c.key);
                    viewOffset = Math.round((d - new Date(todayD.getFullYear(), todayD.getMonth(), todayD.getDate())) / 86400000);
                    renderAll();
                });
                $('miniCal').appendChild(el);
            });
            const vk = viewKey();
            const tasks = getTasksForDay(vk);
            const comp = vk === today ? D.today : {};
            const allDone = tasks.length > 0 && tasks.every(t => comp[t.id] === true);
            const vd = new Date(vk);
            $('chainDate').textContent = vd.toLocaleDateString('en', { weekday: 'short', day: 'numeric', month: 'short' });
            if (vk === today) $('chainTodayBadge').textContent = "Today's Chain";
            else if (vk === dk(new Date(Date.now() - 86400000))) $('chainTodayBadge').textContent = "Yesterday";
            else if (vk === dk(new Date(Date.now() + 86400000))) $('chainTodayBadge').textContent = "Tomorrow";
            else $('chainTodayBadge').textContent = '';
            $('chainStatus').textContent = tasks.length === 0 ? 'no tasks' : allDone ? 'complete' : 'incomplete';
            $('chainStatus').className = 'chain-status ' + (allDone && tasks.length > 0 ? 'yes' : 'no');
            $('taskList').innerHTML = tasks.map((t, idx) => { const isDone = comp[t.id] === true; return '<div class="task' + (isDone ? ' done' : '') + '"><div class="task-dot' + (isDone ? ' done' : '') + '" data-id="' + t.id + '">' + (isDone ? '✓' : '') + '</div><div class="task-info"><input class="task-name-input" value="' + esc(t.name) + '" data-id="' + t.id + '" data-field="name"><div class="task-time-row"><input class="task-time-input" value="' + (t.start || '') + '" data-id="' + t.id + '" data-field="start" placeholder="start"><span style="color:#C1C0BD;">–</span><input class="task-time-input" value="' + (t.end || '') + '" data-id="' + t.id + '" data-field="end" placeholder="end"></div></div><div class="task-grip" data-id="' + t.id + '">⋮⋮</div><div class="task-del" data-id="' + t.id + '">×</div></div>'; }).join('');
            $('taskList').querySelectorAll('.task-dot').forEach(el => { el.addEventListener('click', () => toggle(parseInt(el.dataset.id))); });
            $('taskList').querySelectorAll('.task-del').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation();
                delTask(parseInt(el.dataset.id)); }); });
            $('taskList').querySelectorAll('.task-grip').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation();
                moveUp(parseInt(el.dataset.id)); }); });
            $('taskList').querySelectorAll('.task-name-input, .task-time-input').forEach(el => { el.addEventListener('click', (e) => e.stopPropagation());
                el.addEventListener('input', () => updateTaskField(parseInt(el.dataset.id), el.dataset.field, el.value)); });
            $('streakDays').textContent = s;
            $('totalDone').textContent = Object.values(D.done).filter(v => v === true).length;
            $('totalMissed').textContent = Object.values(D.done).filter(v => v === false).length;
            renderChainRing();
            renderWeekRings();
            renderGoals();
            renderManifest();
            renderGameLog();
            loadSw();
            save();
        }
        function esc(s) { const d = document.createElement('div');
            d.textContent = s; return d.innerHTML; }
        function updateTaskField(id, field, value) {
            const vk = viewKey();
            if (vk === tk()) { const t = D.tasks.find(t => t.id === id); if (t) t[field] = value; } else { if (!D.future[vk]) D.future[vk] = JSON.parse(JSON.stringify(D.tasks)); const t = D.future[vk].find(t => t.id === id); if (t) t[field] = value; }
            save();
        }
        function toggle(id) { if (viewKey() !== tk()) return;
            D.today[id] = !D.today[id]; const tasks = D.tasks;
            const allDone = tasks.length > 0 && tasks.every(t => D.today[t.id] === true);
            D.done[tk()] = allDone ? true : false;
            if (allDone) setTimeout(showLetter, 500);
            save();
            renderAll(); }
        function delTask(id) { if (!confirm('Delete?')) return; const vk = viewKey(); if (vk === tk()) { D.tasks = D.tasks.filter(t => t.id !== id);
                delete D.today[id]; } else { if (!D.future[vk]) D.future[vk] = JSON.parse(JSON.stringify(D.tasks));
            D.future[vk] = D.future[vk].filter(t => t.id !== id); }
            save();
            renderAll(); }
        function moveUp(id) { const vk = viewKey(); let tasks = vk === tk() ? D.tasks : (D.future[vk] || []); if (vk !== tk() && !D.future[vk]) { D.future[vk] = JSON.parse(JSON.stringify(D.tasks));
            tasks = D.future[vk]; } const idx = tasks.findIndex(t => t.id === id); if (idx <= 0) return;
            [tasks[idx - 1], tasks[idx]] = [tasks[idx], tasks[idx - 1]]; if (vk === tk()) D.tasks = tasks;
            else D.future[vk] = tasks;
            save();
            renderAll(); }
        function addTask() { const name = $('newTaskName').value.trim(); if (!name) return; const vk = viewKey(); const t = { id: D.nextId++, name, start: $('newTaskStart').value.trim(), end: $('newTaskEnd').value.trim() }; if (vk === tk()) D.tasks.push(t); else { if (!D.future[vk]) D.future[vk] = JSON.parse(JSON.stringify(D.tasks));
            D.future[vk].push(t); }
            $('newTaskName').value = '';
            $('newTaskStart').value = '';
            $('newTaskEnd').value = '';
            save();
            renderAll(); }
        function recordGame(type) { const reason = $('gameInput').value.trim();
            if (!D.gameLog) D.gameLog = {};
            const today = tk();
            if (!D.gameLog[today]) D.gameLog[today] = [];
            D.gameLog[today].push({ type, reason: reason || (type === 'win' ? 'Did it' : 'Gave in'), ts: Date.now() });
            if (type === 'win') D.wins = (D.wins || 0) + 1;
            else D.impulses = (D.impulses || 0) + 1;
            $('gameInput').value = '';
            toast(type === 'win' ? 'Win!' : 'Impulse');
            save();
            renderAll(); }
        function dup(key) { if (!D.future[key]) D.future[key] = JSON.parse(JSON.stringify(D.tasks)); }

        const last = localStorage.getItem('bm_last_date');
        if (last !== tk()) { D.today = {}; if (D.future[tk()]) { D.tasks = JSON.parse(JSON.stringify(D.future[tk()]));
                delete D.future[tk()]; } localStorage.setItem('bm_last_date', tk());
            setTimeout(showLetter, 800); }

        $('gameWinBtn').addEventListener('click', () => recordGame('win'));
        $('gameLoseBtn').addEventListener('click', () => recordGame('lose'));
        $('addTaskBtn').addEventListener('click', addTask);
        $('newTaskName').addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });
        $('chainPrevBtn').addEventListener('click', () => { viewOffset--;
            renderAll(); });
        $('chainNextBtn').addEventListener('click', () => { viewOffset++;
            renderAll(); });
        $('resetDayBtn').addEventListener('click', () => { if (confirm('Reset this day?')) { const vk = viewKey(); if (vk === tk()) { D.today = {}; } D.done[vk] = false;
            save();
            renderAll();
            toast('Day reset'); } });
        $('dupTomorrowBtn').addEventListener('click', () => { const d = new Date();
            d.setDate(d.getDate() + 1);
            dup(dk(d));
            toast('Duplicated to tomorrow');
            renderAll(); });
        $('dupWeekBtn').addEventListener('click', () => { for (let i = 1; i <= 7; i++) { const d = new Date();
                d.setDate(d.getDate() + i);
                dup(dk(d)); } toast('7 days duplicated');
            renderAll(); });
        $('addGoalBtn').addEventListener('click', () => { const name = $('newGoalInput').value.trim(); if (!name) return;
            D.goals.push({ id: D.nextGoalId++, name, done: false });
            $('newGoalInput').value = '';
            save();
            renderGoals(); });
        $('newGoalInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('addGoalBtn').click(); });
        $('exportBtn').addEventListener('click', () => { $('panelOverlay').classList.remove('show');
            $('slidePanel').classList.remove('show');
            exportData(); });
        $('importBtn').addEventListener('click', () => { $('importFile').click(); });
        $('importFile').addEventListener('change', (e) => { if (e.target.files[0]) { importData(e.target.files[0]);
                $('panelOverlay').classList.remove('show');
                $('slidePanel').classList.remove('show'); } });
        $('menuBtn').addEventListener('click', () => { $('panelOverlay').classList.add('show');
            $('slidePanel').classList.add('show'); });
        $('panelCloseBtn').addEventListener('click', () => { $('panelOverlay').classList.remove('show');
            $('slidePanel').classList.remove('show'); });
        $('panelOverlay').addEventListener('click', () => { $('panelOverlay').classList.remove('show');
            $('slidePanel').classList.remove('show'); });
        $('panelTodayBtn').addEventListener('click', () => { viewOffset = 0;
            $('panelOverlay').classList.remove('show');
            $('slidePanel').classList.remove('show');
            renderAll(); });
        $('panelCalBtn').addEventListener('click', () => { $('panelOverlay').classList.remove('show');
            $('slidePanel').classList.remove('show');
            $('calModal').classList.add('show');
            renderCalModal(); });
        $('panelResetBtn').addEventListener('click', () => { $('panelOverlay').classList.remove('show');
            $('slidePanel').classList.remove('show'); if (confirm('Reset everything?')) { D = { wins: 0, impulses: 0, tasks: [{ id: 1, name: 'Make the bed', start: '07:00', end: '07:05' }], done: {}, today: {}, nextId: 2, future: {}, swHistory: {}, goals: D.goals, nextGoalId: D.nextGoalId, gameLog: {} };
                save();
                renderAll();
                toast('All reset'); } });
        let calViewMonth = new Date().getMonth(), calViewYear = new Date().getFullYear();
        function renderCalModal() {
            $('calMonthTitle').textContent = new Date(calViewYear, calViewMonth).toLocaleString('en', { month: 'long', year: 'numeric' });
            const firstDay = new Date(calViewYear, calViewMonth, 1).getDay(), daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
            const wrc = 2 * Math.PI * 8;
            let html = '';
            ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => html += '<div style="font-size:9px;color:#C5C5C5;text-align:center;">' + d + '</div>');
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;
            for (let i = 0; i < startOffset; i++) html += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) { const key = calViewYear + '-' + String(calViewMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0'); const tasks = getTasksForDay(key); const total = tasks.length; const doneCount = D.done[key] === true ? total : (key === tk() ? tasks.filter(t => D.today[t.id] === true).length : 0); const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0; let cls = 'cal-cell-wrap'; if (key === tk()) cls += ' today';
                html += '<div class="' + cls + '" data-key="' + key + '"><div class="cal-num">' + d + '</div><svg class="cal-mini-ring" viewBox="0 0 22 22"><circle class="cmr-bg" cx="11" cy="11" r="8"/><circle class="cmr-fill' + (D.done[key] === true ? ' done' : '') + '" cx="11" cy="11" r="8" stroke-dasharray="' + wrc.toFixed(1) + '" stroke-dashoffset="' + (wrc - (pct / 100) * wrc) + '"/></svg></div>'; }
            $('calGrid').innerHTML = html;
            $('calGrid').querySelectorAll('.cal-cell-wrap[data-key]').forEach(el => { el.addEventListener('click', () => { const d = new Date(el.dataset.key);
                viewOffset = Math.round((d - new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate())) / 86400000);
                $('calModal').classList.remove('show');
                renderAll(); }); });
        }
        $('calCloseBtn').addEventListener('click', () => $('calModal').classList.remove('show'));
        $('calModal').addEventListener('click', (e) => { if (e.target === $('calModal')) $('calModal').classList.remove('show'); });
        $('calPrevMonth').addEventListener('click', () => { calViewMonth--;
            if (calViewMonth < 0) { calViewMonth = 11;
                calViewYear--; } renderCalModal(); });
        $('calNextMonth').addEventListener('click', () => { calViewMonth++;
            if (calViewMonth > 11) { calViewMonth = 0;
                calViewYear++; } renderCalModal(); });
        renderAll();
    </script>
</body>
</html>
