<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Better Me">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><rect width='180' height='180' rx='40' fill='%23F5F3EF' stroke='%231B1B1B' stroke-width='3'/><circle cx='58' cy='90' r='14' fill='none' stroke='%23C5C0B8' stroke-width='4'/><circle cx='122' cy='90' r='14' fill='none' stroke='%23C5C0B8' stroke-width='4'/><circle cx='90' cy='90' r='14' fill='%2337442F' stroke='%2337442F' stroke-width='4'/><line x1='72' y1='90' x2='76' y2='90' stroke='%23C5C0B8' stroke-width='4'/><line x1='104' y1='90' x2='108' y2='90' stroke='%23C5C0B8' stroke-width='4'/></svg>">
    <title>Better Me</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        :root {
            --bg: #F4F2EF;
            --card: #FFFFFF;
            --text: #1B1B1B;
            --text-light: #999;
            --text-muted: #C5C5C5;
            --border: #E8E4DD;
            --khaki: #37442F;
            --win: #5B8C7A;
            --lose: #B06A6A;
            --radius: 12px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 60px 16px 120px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            font-size: 15px;
            overflow-x: hidden;
            letter-spacing: -0.2px;
            font-stretch: expanded;
        }
        input {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        .app {
            max-width: 420px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 0 4px;
        }
        .header .titles {
            flex: 1;
        }
        .header h1 {
            font-size: 21px;
            font-weight: 500;
            letter-spacing: -0.3px;
        }
        .header .sub {
            font-size: 10px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-top: 2px;
        }
        .menu-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            flex-shrink: 0;
            margin-left: 12px;
        }
        .panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 200;
            pointer-events: none;
            transition: background 0.3s;
        }
        .panel-overlay.show {
            background: rgba(27,25,22,0.5);
            pointer-events: all;
        }
        .slide-panel {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: #FFFEFB;
            z-index: 210;
            box-shadow: -4px 0 30px rgba(0,0,0,0.1);
            transition: right 0.35s;
            padding: 60px 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .slide-panel.show {
            right: 0;
        }
        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .section-title {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
        }
        .panel-btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 12px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: var(--text);
        }
        .panel-btn.danger {
            color: #B06A6A;
            border-color: #E8D5D5;
        }
        .panel-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-family: inherit;
        }
        .week-rings {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .week-ring {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 8px;
            color: var(--text-muted);
        }
        .week-ring svg {
            width: 34px;
            height: 34px;
            transform: rotate(-90deg);
        }
        .wr-bg {
            fill: none;
            stroke: #EDECE9;
            stroke-width: 3;
        }
        .wr-fill {
            fill: none;
            stroke: var(--khaki);
            stroke-width: 3;
            stroke-linecap: round;
        }
        .wr-fill.done {
            stroke: var(--win);
        }
        .goals-summary {
            font-size: 11px;
            color: var(--text-light);
            cursor: pointer;
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .goals-expanded {
            display: block;
        }
        .goals-expanded.hidden {
            display: none;
        }
        .goal-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            font-size: 11px;
        }
        .goal-check {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid #C5C0B8;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: transparent;
        }
        .goal-check.done {
            background: var(--khaki);
            border-color: var(--khaki);
            color: #FFF;
        }
        .goal-name {
            flex: 1;
        }
        .goal-del {
            font-size: 10px;
            color: #CCC;
            cursor: pointer;
        }
        .manifest-box {
            background: #FBFAF5;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 10px;
            color: var(--text-light);
            font-style: italic;
            text-align: center;
        }
        .cal-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(27,25,22,0.7);
            z-index: 250;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
        }
        .cal-modal.show {
            opacity: 1;
            pointer-events: all;
        }
        .cal-modal-card {
            background: #FFFEFB;
            border-radius: 20px;
            padding: 20px 16px;
            margin: 16px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .cal-month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 15px;
        }
        .cal-month-header button {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            color: var(--text);
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px 3px;
            text-align: center;
        }
        .cal-cell-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 3px 0;
            border-radius: 8px;
        }
        .cal-num {
            font-size: 11px;
            font-weight: 500;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .cal-cell-wrap.today .cal-num {
            background: var(--khaki);
            color: #FFF;
        }
        .cal-mini-ring {
            width: 20px;
            height: 20px;
            transform: rotate(-90deg);
        }
        .cmr-bg {
            fill: none;
            stroke: #EDECE9;
            stroke-width: 2.5;
        }
        .cmr-fill {
            fill: none;
            stroke: var(--khaki);
            stroke-width: 2.5;
            stroke-linecap: round;
        }
        .cmr-fill.done {
            stroke: var(--win);
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
        }
        .score-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .score-box {
            flex: 1;
            text-align: center;
            padding: 10px 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #FAFAF8;
        }
        .score-box .label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
        }
        .score-box .val {
            font-size: 32px;
            font-weight: 400;
            color: var(--text);
        }
        .streak-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }
        .streak-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #E5E0D8;
        }
        .streak-dot.on {
            background: var(--khaki);
        }
        .streak-num {
            font-size: 11px;
            font-weight: 500;
            margin-left: 6px;
            color: var(--text-light);
        }
        .bar-wrap {
            margin-bottom: 10px;
        }
        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        .bar {
            height: 3px;
            background: #E8E5DE;
            border-radius: 2px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--khaki);
            border-radius: 2px;
            transition: width 0.4s;
        }
        .input-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .input-row input {
            flex: 1;
            padding: 9px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 12px;
            background: #FAFAF8;
            outline: none;
            font-family: inherit;
        }
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .btn {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
        }
        .btn-win {
            background: #F6F9F7;
            border-color: #C5DCD0;
            color: #3D6B57;
        }
        .btn-lose {
            background: #FBF7F7;
            border-color: #E5CCCC;
            color: #8B5555;
        }
        .game-log-toggle {
            font-size: 10px;
            color: var(--text-light);
            cursor: pointer;
            text-align: center;
            padding: 4px 0;
        }
        .game-log-list {
            display: none;
            max-height: 120px;
            overflow-y: auto;
        }
        .game-log-list.show {
            display: block;
        }
        .game-log-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 10px;
            border-bottom: 1px solid #F5F3EF;
            gap: 6px;
        }
        .gl-reason {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .gl-type {
            font-weight: 500;
            font-size: 9px;
        }
        .gl-type.win {
            color: var(--win);
        }
        .gl-type.lose {
            color: var(--lose);
        }
        .mini-cal {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 4px 0;
        }
        .mini-day {
            min-width: 34px;
            height: 40px;
            border-radius: 6px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            color: var(--text-muted);
            flex-shrink: 0;
            cursor: pointer;
        }
        .mini-day.today {
            border-color: var(--text);
            border-width: 1.5px;
        }
        .mini-day.selected {
            border-color: var(--khaki);
            background: #F6F5F0;
        }
        .mini-day.done::after {
            content: '●';
            font-size: 5px;
            color: var(--khaki);
        }
        .mini-day.missed::after {
            content: '○';
            font-size: 5px;
            color: var(--lose);
        }
        .mini-day .dow {
            font-size: 7px;
        }
        .mini-day .num {
            font-size: 11px;
            font-weight: 500;
            color: var(--text);
        }
        .chain-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .chain-top {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chain-nav button {
            width: 24px;
            height: 24px;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: var(--card);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            color: var(--text);
        }
        .chain-date {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            min-width: 60px;
            text-align: center;
        }
        .chain-today-badge {
            font-size: 8px;
            color: var(--win);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chain-status {
            font-size: 9px;
            font-weight: 500;
        }
        .chain-status.no {
            color: #B06A6A;
        }
        .chain-status.yes {
            color: var(--win);
        }
        .chain-ring-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chain-ring-container {
            position: relative;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }
        .chain-ring-svg {
            width: 44px;
            height: 44px;
            transform: rotate(-90deg);
        }
        .cr-bg {
            fill: none;
            stroke: #EDECE9;
            stroke-width: 4;
        }
        .cr-fill {
            fill: none;
            stroke: var(--khaki);
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s;
        }
        .cr-fill.complete {
            stroke: var(--win);
        }
        .cr-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 500;
            color: var(--text);
        }
        .task {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-bottom: 1px solid #F5F3EF;
        }
        .task:last-child {
            border-bottom: none;
        }
        .task-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #E0DCD5;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: transparent;
            cursor: pointer;
        }
        .task-dot.done {
            background: var(--khaki);
            border-color: var(--khaki);
            color: #FFF;
        }
        .task-info {
            flex: 1;
            min-width: 0;
        }
        .task-name-input {
            font-size: 12px;
            border: none;
            background: transparent;
            outline: none;
            font-family: inherit;
            width: 100%;
            color: var(--text);
            padding: 2px 0;
        }
        .task.done .task-name-input {
            text-decoration: line-through;
            color: #C5C5C5;
        }
        .task-time-row {
            display: flex;
            gap: 4px;
            align-items: center;
            margin-top: 2px;
        }
        .task-time-input {
            font-size: 9px;
            color: var(--text-light);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 2px 4px;
            width: 48px;
            text-align: center;
            background: #FAFAF8;
            outline: none;
            font-family: inherit;
        }
        .task-grip {
            font-size: 11px;
            color: #C5C0B8;
            cursor: pointer;
            padding: 4px 2px;
        }
        .task-del {
            font-size: 12px;
            color: #CCC;
            cursor: pointer;
            padding: 2px;
        }
        .add-row {
            display: flex;
            gap: 5px;
            padding: 8px 12px;
            border-top: 1px solid var(--border);
        }
        .add-row input {
            padding: 7px 8px;
            border-radius: 5px;
            border: 1px solid var(--border);
            font-size: 11px;
            background: #FAFAF8;
            outline: none;
            font-family: inherit;
        }
        .add-row input.name {
            flex: 2;
        }
        .add-row input.time {
            flex: 1;
            text-align: center;
            min-width: 45px;
        }
        .add-row button {
            padding: 7px 10px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            color: var(--text);
        }
        .actions {
            display: flex;
            gap: 5px;
            padding: 8px 12px 10px;
            flex-wrap: wrap;
        }
        .actions button {
            font-size: 9px;
            color: var(--text-light);
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 7px;
            cursor: pointer;
            font-family: inherit;
        }
        .stopwatch-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px;
            border: 1px solid var(--border);
        }
        .stopwatch-card h3 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 10px;
        }
        .sw-display {
            font-size: 42px;
            font-weight: 300;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-family: 'SF Mono', 'Menlo', monospace;
            padding: 10px 0;
            background: #FAFAF8;
            border-radius: 8px;
        }
        .sw-task-input {
            width: 100%;
            padding: 9px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 13px;
            background: #FAFAF8;
            outline: none;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .sw-btns {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .sw-btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            background: var(--card);
            color: var(--text);
            font-weight: 500;
        }
        .sw-btn.start {
            background: #F6F9F7;
            border-color: #C5DCD0;
            color: #3D6B57;
        }
        .sw-btn.stop {
            background: #FBF7F7;
            border-color: #E5CCCC;
            color: #8B5555;
        }
        .sw-history {
            max-height: 180px;
            overflow-y: auto;
        }
        .sw-history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #F5F3EF;
            font-size: 11px;
            gap: 8px;
        }
        .sw-h-task {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sw-h-time {
            font-family: 'SF Mono', 'Menlo', monospace;
            color: var(--text-light);
            font-size: 11px;
        }
        .sw-h-del {
            color: #CCC;
            cursor: pointer;
            font-size: 12px;
        }
        .stats {
            display: flex;
            gap: 6px;
        }
        .stat {
            flex: 1;
            background: var(--card);
            border-radius: var(--radius);
            padding: 10px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat .v {
            font-size: 22px;
            font-weight: 500;
        }
        .stat .l {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-light);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1B1B1B;
            color: #E0D6C2;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(27,27,27,0.7);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        .modal.show {
            opacity: 1;
            pointer-events: all;
        }
        .modal-card {
            background: #FFFEFB;
            border-radius: 16px;
            padding: 28px 22px;
            margin: 20px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-q {
            font-size: 14px;
            font-weight: 400;
            color: #1B1B1B;
            line-height: 1.6;
            margin-bottom: 6px;
            white-space: pre-line;
            text-align: left;
        }
        .modal-sub {
            font-size: 11px;
            color: #999;
            font-style: italic;
            margin-bottom: 14px;
        }
        .modal-btn {
            padding: 8px 24px;
            border-radius: 20px;
            border: 1px solid #C9B99A;
            background: #F5F3EF;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header"><div class="titles"><h1>the best version of myself</h1><div class="sub">vs. the minute desire</div></div><button class="menu-btn" onclick="togglePanel()">☰</button></div>
        <div class="manifest-box" id="manifestBox"></div>
        <div class="card">
            <div class="score-row"><div class="score-box"><div class="label">Wins</div><div class="val" id="winScore">0</div></div><div class="score-box"><div class="label">Impulses</div><div class="val" id="impulseScore">0</div></div></div>
            <div class="streak-row" id="streakDots"></div>
            <div class="bar-wrap"><div class="bar-label"><span id="ratioText">0:0</span><span>Goal 70%</span></div><div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div></div>
            <div class="input-row"><input type="text" id="gameInput" placeholder="What happened?" maxlength="60"></div>
            <div class="btn-row"><button class="btn btn-win" onclick="recordGame('win')">I Won</button><button class="btn btn-lose" onclick="recordGame('lose')">Impulse</button></div>
            <div class="game-log-toggle" onclick="toggleGameLog()" id="gameLogToggle">No moments today</div>
            <div class="game-log-list" id="gameLogList"></div>
        </div>
        <div class="mini-cal" id="miniCal"></div>
        <div class="chain-card">
            <div class="chain-top"><div class="chain-ring-row"><div class="chain-ring-container"><svg class="chain-ring-svg" viewBox="0 0 44 44"><circle class="cr-bg" cx="22" cy="22" r="18"/><circle class="cr-fill" id="chainRingFill" cx="22" cy="22" r="18" stroke-dasharray="113.1" stroke-dashoffset="113.1"/></svg><div class="cr-text" id="chainRingText">0%</div></div><div><div class="chain-nav"><button onclick="prevDay()">←</button><div style="text-align:center;"><div class="chain-date" id="chainDate"></div><div class="chain-today-badge" id="chainTodayBadge"></div></div><button onclick="nextDay()">→</button></div><span class="chain-status no" id="chainStatus">incomplete</span></div></div></div>
            <div id="taskList"></div>
            <div class="add-row"><input type="text" class="name" id="newTaskName" placeholder="+ task" maxlength="50"><input type="text" class="time" id="newTaskStart" placeholder="start" maxlength="8"><input type="text" class="time" id="newTaskEnd" placeholder="end" maxlength="8"><button onclick="addTask()">Add</button></div>
            <div class="actions"><button onclick="dupPrev()">↻ Dup to Previous</button><button onclick="dupNext()">↻ Dup to Tomorrow</button><button onclick="dupWeek()">↻ Dup 7 Days</button><button onclick="resetDay()">Reset Day</button></div>
        </div>
        <div class="stopwatch-card"><h3>Stopwatch</h3><div class="sw-display" id="swDisplay">00:00:00</div><input type="text" class="sw-task-input" id="swTaskName" placeholder="What are you working on?" maxlength="50"><div class="sw-btns"><button class="sw-btn start" onclick="swStart()">Start</button><button class="sw-btn stop" onclick="swStop()">Stop</button><button class="sw-btn" onclick="swReset()">Reset</button></div><div class="sw-history" id="swHistory"></div></div>
        <div class="stats"><div class="stat"><div class="v" id="streakDays">0</div><div class="l">Day Streak</div></div><div class="stat"><div class="v" id="totalDone">0</div><div class="l">Chains Done</div></div><div class="stat"><div class="v" id="totalMissed">0</div><div class="l">Missed</div></div></div>
        <div class="toast" id="toast"></div>
    </div>
    <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
    <div class="slide-panel" id="slidePanel">
        <button class="panel-close" onclick="closePanel()">×</button>
        <div class="panel-section"><div class="section-title">This Week</div><div class="week-rings" id="weekRings"></div></div>
        <div class="panel-section"><div class="section-title">Goals</div><div class="goals-summary" onclick="toggleGoals()" id="goalsSummary"></div><div class="goals-expanded" id="goalsExpanded"></div><div style="display:flex;gap:4px;"><input type="text" id="newGoalInput" placeholder="+ goal" maxlength="40" style="flex:1;padding:7px 8px;border-radius:5px;border:1px solid var(--border);font-size:11px;background:#FAFAF8;outline:none;font-family:inherit;"><button onclick="addGoal()" style="padding:7px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);font-size:11px;cursor:pointer;font-family:inherit;">Add</button></div></div>
        <div class="panel-section"><div class="section-title">Navigation</div><button class="panel-btn" onclick="openCalendar()">Full Calendar</button><button class="panel-btn" onclick="goToday()">Go to Today</button></div>
        <div class="panel-section"><div class="section-title">Backup</div><button class="panel-btn" onclick="exportData()">Export Data</button><button class="panel-btn" onclick="document.getElementById('importFile').click()">Import Data</button><input type="file" id="importFile" accept=".json" onchange="importData(this.files[0])" style="display:none;"></div>
        <div class="panel-section"><div class="section-title">Data</div><button class="panel-btn danger" onclick="resetAll()">Reset All Progress</button></div>
    </div>
    <div class="cal-modal" id="calModal" onclick="if(event.target===this)this.classList.remove('show')"><div class="cal-modal-card"><div class="cal-month-header"><button onclick="calPrev()">←</button><span id="calMonthTitle"></span><button onclick="calNext()">→</button></div><div class="cal-grid" id="calGrid"></div><button class="cal-close" onclick="closeCalendar()">Close</button></div></div>
    <div class="modal" id="motiveModal" onclick="if(event.target===this)this.classList.remove('show')"><div class="modal-card"><div class="modal-q" id="motiveQuote"></div><div class="modal-sub" id="motiveSub"></div><button class="modal-btn" onclick="closeLetter()">Thank you</button></div></div>

    <script>
        const STORAGE = 'bm_final_fixed';
        function load() {
            const r = localStorage.getItem(STORAGE);
            if (r) { try { return JSON.parse(r); } catch (e) {} }
            // Try to find old data
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const r2 = localStorage.getItem(key);
                if (!r2) continue;
                try {
                    const d = JSON.parse(r2);
                    if (d && d.tasks && Array.isArray(d.tasks) && d.done) {
                        localStorage.setItem(STORAGE, r2);
                        return d;
                    }
                } catch (e) {}
            }
            return { wins: 0, impulses: 0, tasks: [{ id: 1, name: 'Make the bed', start: '07:00', end: '07:05' }], done: {}, nextId: 2, future: {}, swHistory: {}, goals: [{ id: 1, name: 'Read 12 books', done: false }], nextGoalId: 2, gameLog: {} };
        }
        function save() { localStorage.setItem(STORAGE, JSON.stringify(D)); }
        let D = load();
        const tk = () => new Date().toISOString().slice(0, 10);
        const dk = (d) => d.toISOString().slice(0, 10);
        const $ = (id) => document.getElementById(id);
        let viewOffset = 0;
        function viewKey() { const d = new Date();
            d.setDate(d.getDate() + viewOffset); return dk(d); }
        const RING = 2 * Math.PI * 18;

        // Stopwatch
        let swInterval = null, swSeconds = 0;
        function swFmt(s) { const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60; return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0'); }
        function swUpdate() { $('swDisplay').textContent = swFmt(swSeconds); }
        function swStart() { if (swInterval) return;
            swInterval = setInterval(() => { swSeconds++;
                swUpdate(); }, 1000);
            $('swStartBtn').textContent = 'Running...'; }
        function swStop() { if (!swInterval && swSeconds === 0) return;
            clearInterval(swInterval);
            swInterval = null; const task = $('swTaskName').value.trim() || 'Untitled'; const today = tk(); if (!D.swHistory) D.swHistory = {}; if (!D.swHistory[today]) D.swHistory[today] = [];
            D.swHistory[today].push({ task, seconds: swSeconds });
            swSeconds = 0;
            swUpdate();
            $('swStartBtn').textContent = 'Start';
            save();
            renderAll();
            toast('Saved: ' + task); }
        function swReset() { clearInterval(swInterval);
            swInterval = null;
            swSeconds = 0;
            swUpdate();
            $('swStartBtn').textContent = 'Start'; }

        function getTasksForDay(key) {
            if (key === tk()) return D.tasks;
            if (D.future && D.future[key]) return D.future[key];
            // For past days, return tasks from future if they exist, or default tasks
            if (D.future && D.future[key]) return D.future[key];
            return [];
        }

        function getCompletedForDay(key) {
            if (key === tk()) return D.today || {};
            // For past/future days, store completion in future[key]._completed or separate
            if (D.future && D.future[key] && D.future[key]._completed) return D.future[key]._completed;
            if (D.done && D.done[key] === true) {
                // Day was marked complete — all tasks done
                const tasks = getTasksForDay(key);
                const obj = {};
                tasks.forEach(t => obj[t.id] = true);
                return obj;
            }
            return {};
        }

        function setCompletedForDay(key, id, value) {
            if (key === tk()) {
                if (!D.today) D.today = {};
                D.today[id] = value;
            } else {
                if (!D.future) D.future = {};
                if (!D.future[key]) D.future[key] = [];
                if (!D.future[key]._completed) D.future[key]._completed = {};
                D.future[key]._completed[id] = value;
            }
            // Update done status
            const tasks = getTasksForDay(key);
            const comp = getCompletedForDay(key);
            const allDone = tasks.length > 0 && tasks.every(t => comp[t.id] === true);
            if (!D.done) D.done = {};
            D.done[key] = allDone ? true : (Object.values(comp).some(v => v === true) ? false : undefined);
            save();
        }

        function recordGame(type) { const reason = $('gameInput').value.trim(); if (!D.gameLog) D.gameLog = {}; const today = tk(); if (!D.gameLog[today]) D.gameLog[today] = [];
            D.gameLog[today].push({ type, reason: reason || (type === 'win' ? 'Did it' : 'Gave in'), ts: Date.now() });
            if (type === 'win') D.wins = (D.wins || 0) + 1;
            else D.impulses = (D.impulses || 0) + 1;
            $('gameInput').value = '';
            toast(type === 'win' ? 'Win!' : 'Impulse');
            save();
            renderAll(); }
        function addTask() { const name = $('newTaskName').value.trim(); if (!name) return; const vk = viewKey(); const t = { id: D.nextId++, name, start: $('newTaskStart').value.trim(), end: $('newTaskEnd').value.trim() }; if (vk === tk()) D.tasks.push(t); else { if (!D.future) D.future = {}; if (!D.future[vk]) D.future[vk] = [];
            D.future[vk].push(t); }
            $('newTaskName').value = '';
            $('newTaskStart').value = '';
            $('newTaskEnd').value = '';
            save();
            renderAll(); }
        function prevDay() { viewOffset--;
            renderAll(); }
        function nextDay() { viewOffset++;
            renderAll(); }
        function resetDay() { if (confirm('Reset this day?')) { const vk = viewKey(); if (vk === tk()) { D.today = {}; } else { if (D.future && D.future[vk]) D.future[vk]._completed = {}; } if (D.done) D.done[vk] = false;
            save();
            renderAll();
            toast('Day reset'); } }
        function dup(key) { if (!D.future) D.future = {}; if (!D.future[key]) D.future[key] = JSON.parse(JSON.stringify(D.tasks)); }
        function dupPrev() { const d = new Date();
            d.setDate(d.getDate() - 1);
            dup(dk(d));
            toast('Done');
            renderAll(); }
        function dupNext() { const d = new Date();
            d.setDate(d.getDate() + 1);
            dup(dk(d));
            toast('Done');
            renderAll(); }
        function dupWeek() { for (let i = 1; i <= 7; i++) { const d = new Date();
                d.setDate(d.getDate() + i);
                dup(dk(d)); } toast('7 days');
            renderAll(); }
        function addGoal() { const name = $('newGoalInput').value.trim(); if (!name) return;
            D.goals.push({ id: D.nextGoalId++, name, done: false });
            $('newGoalInput').value = '';
            save();
            renderAll(); }
        function togglePanel() { $('panelOverlay').classList.toggle('show');
            $('slidePanel').classList.toggle('show'); }
        function closePanel() { $('panelOverlay').classList.remove('show');
            $('slidePanel').classList.remove('show'); }
        function goToday() { viewOffset = 0;
            closePanel();
            renderAll(); }
        function toggleGoals() { $('goalsExpanded').classList.toggle('hidden'); }
        function openCalendar() { closePanel();
            $('calModal').classList.add('show');
            renderCalModal(); }
        function closeCalendar() { $('calModal').classList.remove('show'); }
        function closeLetter() { $('motiveModal').classList.remove('show'); }
        function resetAll() { closePanel(); if (confirm('Reset everything?')) { D = { wins: 0, impulses: 0, tasks: [{ id: 1, name: 'Make the bed', start: '07:00', end: '07:05' }], done: {}, nextId: 2, future: {}, swHistory: {}, goals: [{ id: 1, name: 'Read 12 books', done: false }], nextGoalId: 2, gameLog: {} };
            save();
            renderAll();
            toast('All reset'); } }
        function exportData() { closePanel(); const blob = new Blob([JSON.stringify(D, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url;
            a.download = 'backup-' + tk() + '.json';
            a.click();
            URL.revokeObjectURL(url);
            toast('Exported!'); }
        function importData(file) { if (!file) return;
            closePanel(); const reader = new FileReader();
            reader.onload = (e) => { try { const imported = JSON.parse(e.target.result); if (imported && imported.tasks) { D = imported;
                    save();
                    renderAll();
                    toast('Imported!'); } else { toast('Invalid file'); } } catch (err) { toast('Error'); } };
            reader.readAsText(file); }
        function toggleGameLog() { $('gameLogList').classList.toggle('show'); const log = (D.gameLog && D.gameLog[tk()]) ? D.gameLog[tk()] : [];
            $('gameLogToggle').textContent = $('gameLogList').classList.contains('show') ? 'Hide moments ▴' : (log.length > 0 ? 'Today\'s moments (' + log.length + ') ▾' : 'No moments today'); }

        // Calendar modal
        let calViewMonth = new Date().getMonth(), calViewYear = new Date().getFullYear();
        function calPrev() { calViewMonth--;
            if (calViewMonth < 0) { calViewMonth = 11;
                calViewYear--; } renderCalModal(); }
        function calNext() { calViewMonth++;
            if (calViewMonth > 11) { calViewMonth = 0;
                calViewYear++; } renderCalModal(); }
        function renderCalModal() {
            $('calMonthTitle').textContent = new Date(calViewYear, calViewMonth).toLocaleString('en', { month: 'long', year: 'numeric' });
            const firstDay = new Date(calViewYear, calViewMonth, 1).getDay(), daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
            const wrc = 2 * Math.PI * 8;
            let html = '';
            ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => html += '<div style="font-size:9px;color:#C5C5C5;text-align:center;">' + d + '</div>');
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;
            for (let i = 0; i < startOffset; i++) html += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) { const key = calViewYear + '-' + String(calViewMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0'); const tasks = getTasksForDay(key); const comp = getCompletedForDay(key); const doneCount = tasks.filter(t => comp[t.id] === true).length; const total = tasks.length; const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0; let cls = 'cal-cell-wrap'; if (key === tk()) cls += ' today'; if (D.done && D.done[key] === true) cls += ' done';
                html += '<div class="' + cls + '" data-key="' + key + '" onclick="calGoTo(\'' + key + '\')"><div class="cal-num">' + d + '</div><svg class="cal-mini-ring" viewBox="0 0 22 22"><circle class="cmr-bg" cx="11" cy="11" r="8"/><circle class="cmr-fill' + (D.done && D.done[key] === true ? ' done' : '') + '" cx="11" cy="11" r="8" stroke-dasharray="' + wrc.toFixed(1) + '" stroke-dashoffset="' + (wrc - (pct / 100) * wrc) + '"/></svg></div>'; }
            $('calGrid').innerHTML = html;
        }
        function calGoTo(key) { const d = new Date(key);
            viewOffset = Math.round((d - new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate())) / 86400000);
            closeCalendar();
            renderAll(); }

        // Letters — pool of unique letters, pick randomly, track used
        const letters = [
            "Dear you,\n\nI'm writing from one year ahead. I know today feels heavy — the endless tasks, the discipline, the same routine. But I need you to know: every single minute you invested is paying off. I speak fluently now. I landed the opportunity we dreamed about. I wake up without anxiety because you built the systems. You did that. The chain you're completing today? It forged me. Don't you dare stop.\n\nWith eternal gratitude,\nYour Future Self",
            "Hey,\n\nIt's you from the future. I won't spoil everything, but I'll say this: the person you become in 6 months is unrecognizable. Her confidence, her clarity, her peace — all because of mornings like this one. When you wanted to skip yoga, you didn't. When English felt impossible, you pushed through. That compound effect? It's real. I'm living proof. Keep going. The transformation is already happening.\n\nLove,\nThe Best Version of You",
            "To the woman reading this,\n\nYou don't know me yet, but I know you. I know the doubt that creeps in at 5am. I know the temptation to scroll instead of pray. But I also know what happens when you override it — day after day. You build a life that most people only fantasize about. You become the person others look at and wonder, 'How does she do it?' This is how. One chain. One day. One decision at a time.\n\nProudly,\nYou (from December)",
            "Dear Present Me,\n\nStop looking for motivation. You don't need it. You have something far more powerful: a system. A chain. A promise to yourself. I'm writing this from a version of reality where you kept that promise. Spoiler: it's beautiful here. The view is worth every early morning, every 'no' to distraction, every 'yes' to discipline. I'm waiting for you. Come find me.\n\nYour Future Self",
            "Hello from tomorrow,\n\nYou're probably tired right now. I remember this exact day — the weight of unfinished tasks, the mental battle. But here's what you can't see yet: this exact struggle is the turning point. In 3 months, you'll look back at this week and realize it was the moment everything shifted. The habit solidified. The identity changed. You stopped being someone who 'tries' and became someone who 'does'. That person is already inside you.\n\nKeep going,\nYou (already transformed)",
            "My dear past self,\n\nI'm crying as I write this. Because I remember how hard it was. The loneliness of discipline. The fear that it wasn't working. But it WAS working. Every single day you showed up, you were planting seeds. And now? Now I'm standing in a forest. A life beyond what we imagined. The language you're learning? I speak it. The career you're building? It's here. The peace you're craving? It found me. Because you didn't quit.\n\nThank you,\nYour Future Self",
            "You,\n\nYes, you. The one reading this at the end of a long chain. I want you to know something: most people never experience this feeling. The feeling of completing what they started. Of keeping a promise to themselves. You just did something extraordinary — you closed every loop. That's not normal. That's exceptional. That's the stuff of high achievers. Carry this feeling into tomorrow. Bottle it. This is your new standard.\n\nNow rest. You earned it.\n\nYour Future Self",
            "Dear finisher,\n\nThere's a version of you in a parallel universe who gave up halfway. Who scrolled instead of studied. Who hit snooze instead of stretching. You are not her. You are the version who stayed. And that small decision — repeated hundreds of times — is what separates extraordinary lives from ordinary ones. You just widened the gap. The universe noticed.\n\nWith admiration,\nYour Highest Self"
        ];
        let usedLetters = [];

        function showLetter() {
            if (usedLetters.length >= letters.length) usedLetters = [];
            const available = letters.filter((_, i) => !usedLetters.includes(i));
            const idx = letters.indexOf(available[Math.floor(Math.random() * available.length)]);
            usedLetters.push(idx);
            $('motiveQuote').textContent = letters[idx];
            $('motiveSub').textContent = '';
            $('motiveModal').classList.add('show');
        }

        function renderAll() {
            $('winScore').textContent = D.wins || 0;
            $('impulseScore').textContent = D.impulses || 0;
            const t = (D.wins || 0) + (D.impulses || 0);
            $('barFill').style.width = t > 0 ? Math.round((D.wins / t) * 100) + '%' : '0%';
            $('ratioText').textContent = t > 0 ? D.wins + ':' + D.impulses + ' (' + Math.round((D.wins / t) * 100) + '%)' : '0:0';

            // Streak
            let s = 0;
            const today = tk();
            if (D.done && D.done[today] === true) { s = 1;
                const d = new Date(); while (true) { d.setDate(d.getDate() - 1); if (D.done && D.done[dk(d)] === true) s++;
                    else break; } } else { const y = new Date();
                y.setDate(y.getDate() - 1); if (D.done && D.done[dk(y)] === true) { s = 1;
                    const d = new Date(y); while (true) { d.setDate(d.getDate() - 1); if (D.done && D.done[dk(d)] === true) s++;
                        else break; } } }
            $('streakDots').innerHTML = Array.from({ length: 7 }, (_, i) => '<div class="streak-dot' + (i < s ? ' on' : '') + '"></div>').join('') + '<span class="streak-num">' + s + ' days</span>';

            // Mini calendar
            const cal = [];
            const now = new Date();
            for (let i = -3; i <= 10; i++) { const d = new Date(now);
                d.setDate(now.getDate() + i); const key = dk(d);
                cal.push({ key, num: d.getDate(), dow: ['S','M','T','W','T','F','S'][d.getDay()], isToday: i === 0, isSel: i === viewOffset, done: D.done && D.done[key] === true, missed: D.done && D.done[key] === false }); }
            $('miniCal').innerHTML = cal.map(c => '<div class="mini-day' + (c.isToday ? ' today' : '') + (c.isSel ? ' selected' : '') + (c.done ? ' done' : '') + (c.missed ? ' missed' : '') + '" onclick="goToDay(\'' + c.key + '\')"><span class="dow">' + c.dow + '</span><span class="num">' + c.num + '</span></div>').join('');

            // Chain
            const vk = viewKey();
            const tasks = getTasksForDay(vk);
            const comp = getCompletedForDay(vk);
            const allDone = tasks.length > 0 && tasks.every(t => comp[t.id] === true);
            $('chainDate').textContent = new Date(vk).toLocaleDateString('en', { weekday: 'short', day: 'numeric', month: 'short' });
            if (vk === today) $('chainTodayBadge').textContent = "Today's Chain";
            else if (vk === dk(new Date(Date.now() - 86400000))) $('chainTodayBadge').textContent = "Yesterday";
            else if (vk === dk(new Date(Date.now() + 86400000))) $('chainTodayBadge').textContent = "Tomorrow";
            else $('chainTodayBadge').textContent = '';
            $('chainStatus').textContent = tasks.length === 0 ? 'no tasks' : allDone ? 'complete' : 'incomplete';
            $('chainStatus').className = 'chain-status ' + (allDone && tasks.length > 0 ? 'yes' : 'no');
            $('taskList').innerHTML = tasks.map(t => { const isDone = comp[t.id] === true; return '<div class="task' + (isDone ? ' done' : '') + '"><div class="task-dot' + (isDone ? ' done' : '') + '" onclick="toggleTask(' + t.id + ')">' + (isDone ? '✓' : '') + '</div><div class="task-info"><input class="task-name-input" value="' + esc(t.name) + '" data-id="' + t.id + '" data-field="name" oninput="updateField(' + t.id + ',this)"><div class="task-time-row"><input class="task-time-input" value="' + (t.start || '') + '" data-id="' + t.id + '" data-field="start" oninput="updateField(' + t.id + ',this)"><span style="color:#C1C0BD;">–</span><input class="task-time-input" value="' + (t.end || '') + '" data-id="' + t.id + '" data-field="end" oninput="updateField(' + t.id + ',this)"></div></div><div class="task-grip" onclick="moveUp(' + t.id + ')">⋮⋮</div><div class="task-del" onclick="delTask(' + t.id + ')">×</div></div>'; }).join('');
            const doneCount = tasks.filter(t => comp[t.id] === true).length;
            const totalTasks = tasks.length;
            const pct = totalTasks > 0 ? Math.round((doneCount / totalTasks) * 100) : 0;
            $('chainRingFill').style.strokeDashoffset = RING - (pct / 100) * RING;
            $('chainRingFill').classList.toggle('complete', pct === 100 && totalTasks > 0);
            $('chainRingText').textContent = totalTasks > 0 ? pct + '%' : '—';

            // Stats
            $('streakDays').textContent = s;
            $('totalDone').textContent = Object.values(D.done || {}).filter(v => v === true).length;
            $('totalMissed').textContent = Object.values(D.done || {}).filter(v => v === false).length;

            // Week rings
            const wDays = getWeekDays();
            const wrc = 2 * Math.PI * 13;
            $('weekRings').innerHTML = wDays.map(d => '<div class="week-ring"><svg viewBox="0 0 34 34"><circle class="wr-bg" cx="17" cy="17" r="13"/><circle class="wr-fill' + (d.done && d.total > 0 ? ' done' : '') + '" cx="17" cy="17" r="13" stroke-dasharray="' + wrc.toFixed(1) + '" stroke-dashoffset="' + (wrc - (d.pct / 100) * wrc) + '"/></svg><span>' + d.label + ' ' + d.date + '</span></div>').join('');

            // Goals
            const doneGoals = D.goals.filter(g => g.done).length;
            const totalGoals = D.goals.length;
            $('goalsSummary').innerHTML = '<span>' + doneGoals + '/' + totalGoals + ' completed</span><span>' + (totalGoals > 0 ? Math.round((doneGoals / totalGoals) * 100) : 0) + '%</span>';
            $('goalsExpanded').innerHTML = D.goals.map(g => '<div class="goal-item"><div class="goal-check' + (g.done ? ' done' : '') + '" onclick="toggleGoal(' + g.id + ')">' + (g.done ? '✓' : '') + '</div><span class="goal-name">' + esc(g.name) + '</span><span class="goal-del" onclick="delGoal(' + g.id + ')">×</span></div>').join('');

            // Game log
            const log = (D.gameLog && D.gameLog[tk()]) ? D.gameLog[tk()] : [];
            $('gameLogToggle').textContent = log.length === 0 ? 'No moments today' : ($('gameLogList').classList.contains('show') ? 'Hide moments ▴' : 'Today\'s moments (' + log.length + ') ▾');
            $('gameLogList').innerHTML = log.slice().reverse().map(l => '<div class="game-log-item"><span class="gl-type ' + l.type + '">' + (l.type === 'win' ? 'Win' : 'Impulse') + '</span><span class="gl-reason">' + esc(l.reason) + '</span></div>').join('');

            // Stopwatch history
            const swHist = (D.swHistory && D.swHistory[tk()]) ? D.swHistory[tk()] : [];
            $('swHistory').innerHTML = swHist.length === 0 ? '<div style="font-size:10px;color:#C5C5C5;text-align:center;padding:10px 0;">No records today</div>' : swHist.slice().reverse().map((h, i) => '<div class="sw-history-item"><span class="sw-h-task">' + esc(h.task) + '</span><span class="sw-h-time">' + swFmt(h.seconds) + '</span><span class="sw-h-del" onclick="delSw(' + (swHist.length - 1 - i) + ')">×</span></div>').join('');

            // Manifestation
            const mfsts = ["Today, the universe aligns for your focus.", "The energy you bring today will ripple through your entire week.", "You are not here to be average.", "Clarity comes from action.", "Your future self is already thanking you.", "Small hinges swing big doors.", "The world gives to those who know what they want.", "Peace is not found. It is built.", "You have 24 hours. That's 1440 minutes.", "The difference between who you are and who you want to be is what you do today.", "Your habits are your destiny.", "Be the woman who decided to go for it.", "You are exactly where you need to be.", "Every master was once a beginner who refused to quit."];
            $('manifestBox').textContent = '✦ ' + mfsts[Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000) % mfsts.length];
            save();
        }

        function goToDay(key) { const todayD = new Date(); const d = new Date(key);
            viewOffset = Math.round((d - new Date(todayD.getFullYear(), todayD.getMonth(), todayD.getDate())) / 86400000);
            renderAll(); }
        function toggleTask(id) {
            const vk = viewKey();
            const comp = getCompletedForDay(vk);
            const newVal = !comp[id];
            setCompletedForDay(vk, id, newVal);
            const tasks = getTasksForDay(vk);
            const updatedComp = getCompletedForDay(vk);
            const allDone = tasks.length > 0 && tasks.every(t => updatedComp[t.id] === true);
            if (allDone) { if (!D.done) D.done = {}; D.done[vk] = true;
                save();
                setTimeout(showLetter, 500); }
            save();
            renderAll(); }
        function delTask(id) { if (!confirm('Delete?')) return; const vk = viewKey(); if (vk === tk()) { D.tasks = D.tasks.filter(t => t.id !== id); if (D.today) delete D.today[id]; } else { if (!D.future) D.future = {}; if (!D.future[vk]) D.future[vk] = JSON.parse(JSON.stringify(D.tasks));
            D.future[vk] = D.future[vk].filter(t => t.id !== id); if (D.future[vk]._completed) delete D.future[vk]._completed[id]; }
            save();
            renderAll(); }
        function moveUp(id) { const vk = viewKey(); let tasks = vk === tk() ? D.tasks : (D.future && D.future[vk] ? D.future[vk] : []); if (vk !== tk() && (!D.future || !D.future[vk])) { if (!D.future) D.future = {}; D.future[vk] = JSON.parse(JSON.stringify(D.tasks));
            tasks = D.future[vk]; } const idx = tasks.findIndex(t => t.id === id); if (idx <= 0) return;
            [tasks[idx - 1], tasks[idx]] = [tasks[idx], tasks[idx - 1]]; if (vk === tk()) D.tasks = tasks;
            else { if (!D.future) D.future = {}; D.future[vk] = tasks; }
            save();
            renderAll(); }
        function updateField(id, el) { const vk = viewKey(); const field = el.dataset.field; const value = el.value; if (vk === tk()) { const t = D.tasks.find(t => t.id === id); if (t) t[field] = value; } else { if (!D.future) D.future = {}; if (!D.future[vk]) D.future[vk] = JSON.parse(JSON.stringify(D.tasks)); const t = D.future[vk].find(t => t.id === id); if (t) t[field] = value; } save(); }
        function toggleGoal(id) { const g = D.goals.find(g => g.id === id); if (g) g.done = !g.done;
            save();
            renderAll(); }
        function delGoal(id) { D.goals = D.goals.filter(g => g.id !== id);
            save();
            renderAll(); }
        function delSw(idx) { const today = tk(); if (D.swHistory && D.swHistory[today]) D.swHistory[today].splice(idx, 1);
            save();
            renderAll(); }
        function getWeekDays() {
            const days = [];
            const today = new Date();
            const dow = today.getDay(), monOff = dow === 0 ? -6 : 1 - dow;
            const mon = new Date(today);
            mon.setDate(today.getDate() + monOff);
            for (let i = 0; i < 7; i++) { const d = new Date(mon);
                d.setDate(mon.getDate() + i); const key = dk(d); const tasks = getTasksForDay(key); const comp = getCompletedForDay(key); const doneCount = tasks.filter(t => comp[t.id] === true).length; const total = tasks.length; const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
                days.push({ key, label: ['M','T','W','T','F','S','S'][i], date: d.getDate(), isToday: key === tk(), pct, total, done: D.done && D.done[key] === true }); }
            return days;
        }
        function esc(s) { const d = document.createElement('div');
            d.textContent = s; return d.innerHTML; }
        function toast(msg) { $('toast').textContent = msg;
            $('toast').classList.add('show');
            setTimeout(() => $('toast').classList.remove('show'), 1800); }

        renderAll();
    </script>
</body>
</html>
