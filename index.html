<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Data</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #F4F2EF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #FFF;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        h2 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #1B1B1B;
        }
        p {
            font-size: 13px;
            color: #999;
            margin-bottom: 20px;
        }
        button {
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-export {
            background: #37442F;
            color: #FFF;
        }
        .btn-export:active {
            opacity: 0.8;
        }
        .found {
            font-size: 12px;
            color: #5B8C7A;
            margin-top: 10px;
        }
        .not-found {
            font-size: 12px;
            color: #B06A6A;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Save Your Data</h2>
        <p>This will export all your progress, chains, goals, and stopwatch history.</p>
        <button class="btn-export" onclick="doExport()">Download Backup</button>
        <div id="status"></div>
    </div>
    <script>
        function doExport() {
            const allKeys = [];
            for (let i = 0; i < localStorage.length; i++) {
                allKeys.push(localStorage.key(i));
            }
            let found = null;
            for (const key of allKeys) {
                const r = localStorage.getItem(key);
                if (!r) continue;
                try {
                    const data = JSON.parse(r);
                    if (data && typeof data === 'object' && data.tasks && Array.isArray(data.tasks) && data.done && typeof data.done === 'object') {
                        found = data;
                        break;
                    }
                } catch (e) {}
            }
            if (found) {
                const blob = new Blob([JSON.stringify(found, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'better-me-backup.json';
                a.click();
                URL.revokeObjectURL(url);
                document.getElementById('status').innerHTML = '<div class="found">✓ Data found and downloaded!</div>';
            } else {
                document.getElementById('status').innerHTML = '<div class="not-found">No data found in this app.</div>';
            }
        }
    </script>
</body>
</html>
